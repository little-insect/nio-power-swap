<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚来换电站数据中心 | NIO Power Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .nio-blue { color: #0066FF; }
        .nio-bg { background-color: #0066FF; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .card { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .source-tag { 
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 12px; font-size: 11px;
        }
        .source-weibo { background: #E6162D; color: white; }
        .source-nio { background: #0066FF; color: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="nio-bg text-white py-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-bolt text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold">蔚来换电站数据中心</h1>
                    <p class="text-blue-200 text-xs">数据来源: 加电小能微博 + 蔚来充电地图</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs text-blue-200">更新于</p>
                <p class="font-mono text-sm font-semibold" id="updateTime">--</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- Key Metrics -->
        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="glass rounded-xl p-4 card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-charging-station nio-blue text-lg"></i>
                    <span class="source-tag source-nio">充电地图</span>
                </div>
                <p class="text-gray-500 text-xs mb-1">换电站总数</p>
                <p class="text-2xl font-bold text-gray-800" id="totalStations">--</p>
                <p class="text-xs text-gray-400 mt-1">实时数据</p>
            </div>

            <div class="glass rounded-xl p-4 card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-plug text-purple-600 text-lg"></i>
                    <span class="source-tag source-nio">官网</span>
                </div>
                <p class="text-gray-500 text-xs mb-1">充电站数量</p>
                <p class="text-2xl font-bold text-gray-800" id="chargingStations">--</p>
            </div>

            <div class="glass rounded-xl p-4 card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-road text-green-600 text-lg"></i>
                    <span class="source-tag source-nio">官网</span>
                </div>
                <p class="text-gray-500 text-xs mb-1">高速换电站</p>
                <p class="text-2xl font-bold text-gray-800" id="highwayStations">--</p>
                <p class="text-xs text-gray-500 mt-1">9纵11横网络</p>
            </div>

            <div class="glass rounded-xl p-4 card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-sync-alt text-orange-600 text-lg"></i>
                    <span class="source-tag source-nio">充电地图</span>
                </div>
                <p class="text-gray-500 text-xs mb-1">累计换电次数</p>
                <p class="text-2xl font-bold text-gray-800" id="totalSwapCount">--</p>
                <p class="text-xs text-gray-400 mt-1">实时统计</p>
            </div>
        </section>

        <!-- Daily Updates from Weibo -->
        <section class="glass rounded-xl p-4 card mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-bold text-gray-800 flex items-center">
                    <i class="fas fa-calendar-day nio-blue mr-2"></i>每日上新
                    <span class="source-tag source-weibo ml-2"><i class="fab fa-weibo"></i>加电小能</span>
                </h3>
                <a href="https://www.weibo.com/u/7001983227" target="_blank" class="text-xs nio-blue hover:underline">
                    查看微博 <i class="fas fa-external-link-alt"></i>
                </a>
            </div>
            <div class="space-y-2 max-h-72 overflow-y-auto" id="dailyUpdates">
                <!-- JS generated -->
            </div>
        </section>

        <!-- Province Ranking -->
        <section class="glass rounded-xl p-4 card mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-bold text-gray-800 flex items-center">
                    <i class="fas fa-map-marked-alt nio-blue mr-2"></i>省级分布 TOP15
                    <span class="source-tag source-nio ml-2">官网</span>
                </h3>
                <a href="https://chargermap.nio.com/pe/h5/static/chargermap#/" target="_blank" class="text-xs nio-blue hover:underline">
                    充电地图 <i class="fas fa-external-link-alt"></i>
                </a>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="text-left py-2 px-2 text-gray-600">排名</th>
                            <th class="text-left py-2 px-2 text-gray-600">省份</th>
                            <th class="text-right py-2 px-2 text-gray-600">数量</th>
                            <th class="text-center py-2 px-2 text-gray-600">趋势</th>
                            <th class="text-left py-2 px-2 text-gray-600">备注</th>
                        </tr>
                    </thead>
                    <tbody id="provinceTable">
                        <!-- JS generated -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Milestones -->
        <section class="glass rounded-xl p-4 card mb-6">
            <h3 class="text-sm font-bold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-trophy nio-blue mr-2"></i>里程碑
                <span class="source-tag source-weibo ml-2"><i class="fab fa-weibo"></i>加电小能</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="milestones">
                <!-- JS generated -->
            </div>
        </section>

        <!-- Coverage Stats -->
        <section class="grid grid-cols-3 gap-4">
            <div class="glass rounded-xl p-4 card text-center">
                <i class="fas fa-city nio-blue text-2xl mb-2"></i>
                <p class="text-gray-500 text-xs mb-1">覆盖城市</p>
                <p class="text-xl font-bold text-gray-800" id="coverageCities">--</p>
            </div>
            <div class="glass rounded-xl p-4 card text-center">
                <i class="fas fa-home text-green-600 text-2xl mb-2"></i>
                <p class="text-gray-500 text-xs mb-1">电区房覆盖率</p>
                <p class="text-xl font-bold text-gray-800" id="powerCoverage">--</p>
            </div>
            <div class="glass rounded-xl p-4 card text-center">
                <i class="fas fa-clock text-purple-600 text-2xl mb-2"></i>
                <p class="text-gray-500 text-xs mb-1">平均换电时间</p>
                <p class="text-xl font-bold text-gray-800">3分钟</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-8">
        <div class="container mx-auto px-4">
            <div class="text-center mb-4">
                <p class="text-sm text-gray-400">数据来源</p>
                <div class="flex justify-center gap-4 mt-2">
                    <a href="https://www.weibo.com/u/7001983227" target="_blank" class="text-red-400 hover:text-red-300">
                        <i class="fab fa-weibo mr-1"></i>加电小能
                    </a>
                    <a href="https://chargermap.nio.com/pe/h5/static/chargermap#/" target="_blank" class="text-blue-400 hover:text-blue-300">
                        <i class="fas fa-map-marker-alt mr-1"></i>蔚来充电地图
                    </a>
                </div>
            </div>
            <p class="text-xs text-gray-500 text-center">本页面仅供数据展示，不代表蔚来官方立场</p>
        </div>
    </footer>

    <script>
        // Load data from JSON
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                // Update header
                document.getElementById('updateTime').textContent = data.updateTime;
                
                // Update metrics
                document.getElementById('totalStations').textContent = data.totalStations.toLocaleString();
                document.getElementById('todayNew').textContent = `今日 +${data.todayNew}`;
                document.getElementById('chargingStations').textContent = data.chargingStations.toLocaleString();
                document.getElementById('highwayStations').textContent = data.highwayStations.toLocaleString();
                document.getElementById('totalSwapCount').textContent = data.totalSwapCount;
                document.getElementById('dailyAvgSwap').textContent = data.dailyAvgSwap;
                document.getElementById('coverageCities').textContent = data.coverage.cities + '+';
                document.getElementById('powerCoverage').textContent = data.coverage.powerCoverage;
                
                // Render daily updates
                const updatesContainer = document.getElementById('dailyUpdates');
                data.dailyUpdates.forEach(day => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-blue-50 transition';
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-xs font-bold nio-blue">
                                ${day.date}
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-gray-800">+${day.newStations}座换电站</p>
                                <p class="text-xs text-gray-500">${day.locations.join('、')}</p>
                            </div>
                        </div>
                        <span class="source-tag source-weibo text-xs"><i class="fab fa-weibo"></i></span>
                    `;
                    updatesContainer.appendChild(div);
                });
                
                // Render province table
                const tableBody = document.getElementById('provinceTable');
                data.provinces.forEach((p, i) => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-100 hover:bg-gray-50 transition';
                    const trendIcon = p.trend === 'up' 
                        ? '<i class="fas fa-arrow-up text-green-500"></i>' 
                        : '<i class="fas fa-minus text-gray-400"></i>';
                    const rankColor = i < 3 ? 'text-yellow-500' : 'text-gray-500';
                    const note = p.note || '';
                    tr.innerHTML = `
                        <td class="py-2 px-2"><span class="${rankColor} font-bold">${i + 1}</span></td>
                        <td class="py-2 px-2 font-medium text-gray-800">${p.name}</td>
                        <td class="py-2 px-2 text-right font-semibold nio-blue">${p.value}</td>
                        <td class="py-2 px-2 text-center">${trendIcon}</td>
                        <td class="py-2 px-2 text-xs text-gray-500">${note}</td>
                    `;
                    tableBody.appendChild(tr);
                });
                
                // Render milestones
                const milestoneContainer = document.getElementById('milestones');
                data.milestones.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center gap-3 p-3 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg';
                    div.innerHTML = `
                        <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-xs">
                            ${m.date}
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-gray-800">${m.event}</p>
                        </div>
                    `;
                    milestoneContainer.appendChild(div);
                });
            })
            .catch(err => {
                console.error('Failed to load data:', err);
                document.body.innerHTML = '<div class="p-8 text-center text-red-500">数据加载失败，请刷新页面重试</div>';
            });
    </script>
</body>
</html>
