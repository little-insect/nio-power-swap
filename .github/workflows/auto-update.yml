name: Daily Data Update

on:
  schedule:
    # 每天北京时间早上9点运行 (UTC+8 = UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update data file
        run: |
          # 获取当前日期
          TODAY=$(date +%Y-%m-%d)
          echo "Updating data for $TODAY"
          
          # 这里可以添加实际的数据抓取逻辑
          # 例如：curl -s "https://api.nio.com/stations" > data.json
          
          # 暂时更新 HTML 中的时间戳
          sed -i "s/上次更新:.*/上次更新: $TODAY/g" index.html
          sed -i "s/id=\"updateTime\">[^<]*/id=\"updateTime\">$TODAY/g" index.html
          
          echo "Data updated successfully"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will commit"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add index.html
          git commit -m "auto: 每日数据更新 $(date +%Y-%m-%d)"
          git push origin main
          echo "Changes committed and pushed"

      - name: Trigger Pages deployment
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
